<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>习题册数据标注工具</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #333; }

  .header {
    background: #1a73e8; color: white; padding: 12px 20px;
    display: flex; align-items: center; gap: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 100;
  }
  .header h1 { font-size: 18px; }
  .header-btns { margin-left: auto; display: flex; gap: 10px; }

  .btn {
    padding: 7px 16px; border: none; border-radius: 6px;
    cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s;
  }
  .btn-primary { background: white; color: #1a73e8; }
  .btn-primary:hover { background: #e8f0fe; }
  .btn-success { background: #34a853; color: white; }
  .btn-success:hover { background: #2d9248; }
  .btn-danger { background: #ea4335; color: white; }
  .btn-danger:hover { background: #d33426; }
  .btn-secondary { background: #5f6368; color: white; }
  .btn-secondary:hover { background: #4a4e52; }

  .main { display: flex; height: calc(100vh - 50px); }

  /* 左侧图片区 */
  .image-panel {
    flex: 1; padding: 16px; overflow: auto; background: #fff;
    border-right: 2px solid #ddd; position: relative;
  }
  .image-container {
    position: relative; display: inline-block;
    border: 1px solid #ccc; cursor: crosshair;
    user-select: none;
  }
  .image-container img {
    display: block; max-width: 100%;
  }
  #upload-placeholder {
    width: 100%; min-height: 400px;
    border: 3px dashed #1a73e8; border-radius: 12px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: #1a73e8; font-size: 16px; gap: 12px;
    cursor: pointer; background: #f8fbff;
    transition: background 0.2s;
  }
  #upload-placeholder:hover { background: #e8f0fe; }
  #upload-placeholder .icon { font-size: 48px; }

  /* 标注框 */
  .annotation-box {
    position: absolute; border: 2px solid;
    cursor: pointer; transition: opacity 0.2s;
  }
  .annotation-box:hover { opacity: 0.8; }
  .annotation-box .box-label {
    position: absolute; top: -22px; left: 0;
    font-size: 11px; font-weight: bold; color: white;
    padding: 1px 6px; border-radius: 3px 3px 0 0;
    white-space: nowrap;
  }
  .annotation-box .box-delete {
    position: absolute; top: -22px; right: 0;
    background: #ea4335; color: white; border: none;
    font-size: 12px; cursor: pointer; padding: 1px 5px;
    border-radius: 3px; display: none;
  }
  .annotation-box:hover .box-delete { display: block; }

  /* 绘制中的临时框 */
  #drawing-box {
    position: absolute; border: 2px dashed #1a73e8;
    background: rgba(26,115,232,0.1); pointer-events: none; display: none;
  }

  /* 右侧标注面板 */
  .annotation-panel {
    width: 360px; display: flex; flex-direction: column;
    background: #fafafa;
  }

  .panel-section {
    padding: 14px 16px; border-bottom: 1px solid #e0e0e0;
  }
  .panel-section h3 {
    font-size: 14px; color: #555; margin-bottom: 10px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }

  /* 题型选择 */
  .type-btns { display: flex; flex-wrap: wrap; gap: 8px; }
  .type-btn {
    padding: 6px 14px; border: 2px solid #ddd; border-radius: 20px;
    background: white; cursor: pointer; font-size: 13px; transition: all 0.2s;
  }
  .type-btn:hover { border-color: #1a73e8; color: #1a73e8; }
  .type-btn.active { border-color: #1a73e8; background: #1a73e8; color: white; }

  /* 标注列表 */
  .annotations-list { flex: 1; overflow-y: auto; padding: 8px 16px; }
  .annotation-item {
    background: white; border: 1px solid #e0e0e0; border-radius: 8px;
    margin-bottom: 10px; padding: 10px 12px; cursor: pointer;
    transition: all 0.2s; border-left: 4px solid;
  }
  .annotation-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .annotation-item.selected { box-shadow: 0 0 0 2px #1a73e8; }
  .ann-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .ann-number { font-weight: bold; font-size: 13px; }
  .ann-type-badge {
    font-size: 11px; padding: 2px 8px; border-radius: 10px; color: white;
  }
  .ann-delete-btn {
    margin-left: auto; background: none; border: none;
    color: #ea4335; cursor: pointer; font-size: 16px; line-height: 1;
  }

  /* 答案状态 */
  .status-label { font-size: 12px; color: #666; margin-bottom: 6px; }
  .status-btns { display: flex; flex-wrap: wrap; gap: 6px; }
  .status-btn {
    padding: 4px 12px; border: 1.5px solid; border-radius: 12px;
    cursor: pointer; font-size: 12px; background: white; transition: all 0.2s;
  }
  .status-btn.correct { border-color: #34a853; color: #34a853; }
  .status-btn.correct.active { background: #34a853; color: white; }
  .status-btn.wrong { border-color: #ea4335; color: #ea4335; }
  .status-btn.wrong.active { background: #ea4335; color: white; }
  .status-btn.partial { border-color: #fbbc04; color: #e37400; }
  .status-btn.partial.active { background: #fbbc04; color: white; }
  .status-btn.blank { border-color: #9aa0a6; color: #9aa0a6; }
  .status-btn.blank.active { background: #9aa0a6; color: white; }

  /* 备注 */
  .note-input {
    width: 100%; border: 1px solid #ddd; border-radius: 6px;
    padding: 6px 10px; font-size: 12px; resize: none;
    font-family: inherit; margin-top: 8px;
  }
  .note-input:focus { outline: none; border-color: #1a73e8; }

  /* 颜色对应 */
  .color-single { border-color: #1a73e8; }
  .color-single .ann-type-badge { background: #1a73e8; }
  .color-single .box-label { background: #1a73e8; }

  .color-multiple { border-color: #9c27b0; }
  .color-multiple .ann-type-badge { background: #9c27b0; }
  .color-multiple .box-label { background: #9c27b0; }

  .color-fill { border-color: #ff9800; }
  .color-fill .ann-type-badge { background: #ff9800; }
  .color-fill .box-label { background: #ff9800; }

  .color-qa { border-color: #009688; }
  .color-qa .ann-type-badge { background: #009688; }
  .color-qa .box-label { background: #009688; }

  /* 图片信息 */
  .image-info { font-size: 13px; color: #555; }
  .image-info span { font-weight: bold; color: #1a73e8; }

  /* 操作提示 */
  .tips { font-size: 12px; color: #888; line-height: 1.8; }

  /* 进度 */
  .progress-bar { background: #e0e0e0; border-radius: 4px; height: 6px; margin-top: 6px; }
  .progress-fill { background: #34a853; border-radius: 4px; height: 100%; transition: width 0.3s; }

  .empty-hint {
    text-align: center; color: #aaa; padding: 30px 0; font-size: 14px;
  }

  /* 子题标注 */
  .sub-question-area { margin-top: 8px; }
  .sub-question-item {
    display: flex; align-items: center; gap: 8px;
    background: #f5f5f5; border-radius: 6px; padding: 6px 8px; margin-bottom: 6px;
  }
  .sub-q-label { font-size: 12px; color: #555; min-width: 40px; }
  .add-sub-btn {
    font-size: 12px; color: #1a73e8; background: none; border: 1px dashed #1a73e8;
    border-radius: 4px; padding: 3px 10px; cursor: pointer; margin-top: 4px;
  }
  .add-sub-btn:hover { background: #e8f0fe; }
</style>
</head>
<body>

<div class="header">
  <h1>📝 习题册数据标注工具</h1>
  <div style="font-size:13px;opacity:0.85;">当前图片：<span id="current-filename">未上传</span></div>
  <div class="header-btns">
    <label class="btn btn-primary" style="cursor:pointer;">
      📁 上传图片
      <input type="file" id="file-input" accept="image/*" style="display:none;">
    </label>
    <button class="btn btn-secondary" onclick="clearAll()">🗑 清空</button>
    <button class="btn btn-success" onclick="exportJSON()">⬇ 导出JSON</button>
  </div>
</div>

<div class="main">
  <!-- 左侧图片区 -->
  <div class="image-panel" id="image-panel">
    <div id="upload-placeholder" onclick="document.getElementById('file-input').click()">
      <div class="icon">🖼</div>
      <div style="font-size:18px;font-weight:bold;">点击上传图片</div>
      <div style="font-size:14px;color:#888;">支持 JPG / PNG / WEBP 格式</div>
      <div style="font-size:13px;color:#aaa;">上传后在图片上拖拽框选答题区域</div>
    </div>
    <div class="image-container" id="image-container" style="display:none;">
      <img id="main-image" src="" alt="标注图片">
      <div id="drawing-box"></div>
      <div id="phase-hint" style="
  display:none; position:absolute; top:8px; left:50%; transform:translateX(-50%);
  background:rgba(26,115,232,0.92); color:white; padding:6px 18px; border-radius:20px;
  font-size:13px; font-weight:bold; z-index:50; pointer-events:none; white-space:nowrap;
">请框选 <span id="phase-hint-text"></span> 区域</div>

      <!-- 标注框动态插入 -->
    </div>
  </div>

  <!-- 右侧面板 -->
  <div class="annotation-panel">

    <!-- 图片信息 -->
    <div class="panel-section">
      <h3>图片信息</h3>
      <div class="image-info">
        文件名：<span id="info-filename">-</span><br>
        尺寸：<span id="info-size">-</span><br>
        标注数：<span id="info-count">0</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>

    <!-- 题型选择 -->
    <div class="panel-section">
      <h3>当前绘制题型</h3>
      <div class="type-btns">
        <button class="type-btn active" data-type="single" onclick="selectType(this,'single')">单选题</button>
        <button class="type-btn" data-type="multiple" onclick="selectType(this,'multiple')">多选题</button>
        <button class="type-btn" data-type="fill" onclick="selectType(this,'fill')">填空题</button>
        <button class="type-btn" data-type="qa" onclick="selectType(this,'qa')">问答题</button>
      </div>
      <div class="tips" style="margin-top:10px;">
        💡 选择题型后，在图片上<b>拖拽</b>框选答题区域
      </div>
    </div>

    <!-- 标注列表 -->
    <div class="panel-section" style="padding-bottom:8px;">
      <h3>标注列表</h3>
    </div>
    <div class="annotations-list" id="annotations-list">
      <div class="empty-hint">暂无标注，请上传图片后开始框选</div>
    </div>

  </div>
</div>

<script>
// ============ 数据 ============
let annotations = [];
let currentType = 'single';
let selectedId = null;
let imageFilename = '';
let imageNaturalW = 0, imageNaturalH = 0;
let displayW = 0, displayH = 0;

// 绘制状态
let isDrawing = false;
let startX = 0, startY = 0;

// 两阶段绘制状态
// phase: null | 'stem' | 'answer'
let drawingPhase = null;
let pendingAnnotation = null; // 已完成题干框、等待画作答框的临时标注


// 题型配置
const typeConfig = {
  single:   { label: '单选', colorClass: 'color-single',   borderColor: '#1a73e8', statuses: ['correct','wrong'] },
  multiple: { label: '多选', colorClass: 'color-multiple', borderColor: '#9c27b0', statuses: ['correct','wrong','partial'] },
  fill:     { label: '填空', colorClass: 'color-fill',     borderColor: '#ff9800', statuses: ['correct','wrong','partial'] },
  qa:       { label: '问答', colorClass: 'color-qa',       borderColor: '#009688', statuses: ['correct','wrong','partial','blank'] },
};
const statusConfig = {
  correct: { label: '✓ 正确',    cls: 'correct' },
  wrong:   { label: '✗ 错误',    cls: 'wrong' },
  partial: { label: '◑ 半对',    cls: 'partial' },
  blank:   { label: '○ 空白',    cls: 'blank' },
};

// ============ 上传图片 ============
document.getElementById('file-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  imageFilename = file.name;
  document.getElementById('current-filename').textContent = imageFilename;
  document.getElementById('info-filename').textContent = imageFilename;

  const reader = new FileReader();
  reader.onload = function(ev) {
    const img = document.getElementById('main-image');
    img.src = ev.target.result;
    img.onload = function() {
      imageNaturalW = img.naturalWidth;
      imageNaturalH = img.naturalHeight;
      document.getElementById('info-size').textContent = imageNaturalW + ' × ' + imageNaturalH;
      document.getElementById('upload-placeholder').style.display = 'none';
      document.getElementById('image-container').style.display = 'inline-block';
      updateDisplaySize();
      setDrawingPhase('stem'); // 上传图片后自动进入题干绘制阶段

    };
  };
  reader.readAsDataURL(file);
  // 重置
  e.target.value = '';
});

function updateDisplaySize() {
  const img = document.getElementById('main-image');
  displayW = img.offsetWidth;
  displayH = img.offsetHeight;
}

// ============ 绘制框 ============
const imageContainer = document.getElementById('image-container');
const drawingBox = document.getElementById('drawing-box');

imageContainer.addEventListener('mousedown', function(e) {
  if (e.target.classList.contains('box-delete') || e.target.tagName === 'BUTTON') return;
  if (!document.getElementById('main-image').src || drawingPhase === null) return;
  isDrawing = true;
  const rect = imageContainer.getBoundingClientRect();
  startX = e.clientX - rect.left;
  startY = e.clientY - rect.top;
  drawingBox.style.display = 'block';
  drawingBox.style.left = startX + 'px';
  drawingBox.style.top = startY + 'px';
  drawingBox.style.width = '0px';
  drawingBox.style.height = '0px';
  e.preventDefault();
});

document.addEventListener('mousemove', function(e) {
  if (!isDrawing) return;
  const rect = imageContainer.getBoundingClientRect();
  const curX = Math.max(0, Math.min(e.clientX - rect.left, imageContainer.offsetWidth));
  const curY = Math.max(0, Math.min(e.clientY - rect.top, imageContainer.offsetHeight));
  const x = Math.min(startX, curX), y = Math.min(startY, curY);
  const w = Math.abs(curX - startX), h = Math.abs(curY - startY);
  drawingBox.style.left = x + 'px';
  drawingBox.style.top = y + 'px';
  drawingBox.style.width = w + 'px';
  drawingBox.style.height = h + 'px';
});

document.addEventListener('mouseup', function(e) {
  if (!isDrawing) return;
  isDrawing = false;
  drawingBox.style.display = 'none';

  const rect = imageContainer.getBoundingClientRect();
  const curX = Math.max(0, Math.min(e.clientX - rect.left, imageContainer.offsetWidth));
  const curY = Math.max(0, Math.min(e.clientY - rect.top, imageContainer.offsetHeight));
  const x = Math.min(startX, curX), y = Math.min(startY, curY);
  const w = Math.abs(curX - startX), h = Math.abs(curY - startY);
  if (w < 10 || h < 10) return;

  updateDisplaySize();
  const scaleX = imageNaturalW / displayW;
  const scaleY = imageNaturalH / displayH;
  const regionDisplay = { x, y, w, h };
  const regionBbox = {
    x: Math.round(x * scaleX), y: Math.round(y * scaleY),
    w: Math.round(w * scaleX), h: Math.round(h * scaleY),
  };

  if (drawingPhase === 'stem') {
    // 第一步：完成题干框，进入等待作答框阶段
    pendingAnnotation = {
      id: Date.now(),
      type: currentType,
      status: null,
      note: '',
      stem:   { display: regionDisplay, bbox: regionBbox },
      answer: null,
      subQuestions: currentType === 'qa' ? [] : null,
    };
    // 画题干框（半透明，等待确认）
    renderTempBox(pendingAnnotation.id + '_stem', regionDisplay, typeConfig[currentType].borderColor, '题干');
    // 进入作答阶段
    setDrawingPhase('answer');

  } else if (drawingPhase === 'answer') {
    // 第二步：完成作答框
    pendingAnnotation.answer = { display: regionDisplay, bbox: regionBbox };
    // 移除临时题干框，正式提交
    removeTempBox(pendingAnnotation.id + '_stem');
    annotations.push(pendingAnnotation);
    renderAnnotationBoxes(pendingAnnotation);
    renderAnnotationsList();
    selectAnnotation(pendingAnnotation.id);
    pendingAnnotation = null;
    setDrawingPhase('stem'); // 自动回到题干阶段，准备下一题

  } else if (drawingPhase === 'sub_stem') {
    // 子题题干框
    const sq = pendingSubQuestion;
    sq.stem = { display: regionDisplay, bbox: regionBbox };
    removeTempBox('sub_stem_tmp');
    renderTempBox('sub_stem_tmp', regionDisplay, '#009688', `子题${sq._index}题干`);
    setDrawingPhase('sub_answer');

  } else if (drawingPhase === 'sub_answer') {
    // 子题作答框
    const sq = pendingSubQuestion;
    sq.answer = { display: regionDisplay, bbox: regionBbox };
    removeTempBox('sub_stem_tmp');
    // 找到所属标注
    const ann = annotations.find(a => a.id === pendingSubAnnotationId);
    if (ann) {
      ann.subQuestions.push({ status: null, note: '', stem: sq.stem, answer: sq.answer, _index: sq._index });
      renderAnnotationBoxes(ann); // 重新渲染该题所有框
      renderAnnotationsList();
      selectAnnotation(ann.id);
    }
    pendingSubQuestion = null;
    pendingSubAnnotationId = null;
    setDrawingPhase('stem'); // 回到主流程
  }
});



// ============ 绘制阶段控制 ============
let pendingSubQuestion = null;
let pendingSubAnnotationId = null;

function setDrawingPhase(phase) {
  drawingPhase = phase;
  const hint = document.getElementById('phase-hint');
  const hintText = document.getElementById('phase-hint-text');
  if (!phase || phase === null) {
    hint.style.display = 'none';
    return;
  }
  hint.style.display = 'block';
  const map = { stem: '题干', answer: '作答', sub_stem: '子题题干', sub_answer: '子题作答' };
  hintText.textContent = map[phase] || phase;
}

function renderTempBox(key, displayRegion, color, label) {
  removeTempBox(key);
  const div = document.createElement('div');
  div.id = 'tmpbox-' + key;
  div.style.cssText = `position:absolute;border:2px dashed ${color};background:${color}18;pointer-events:none;`;
  div.style.left = displayRegion.x + 'px';
  div.style.top = displayRegion.y + 'px';
  div.style.width = displayRegion.w + 'px';
  div.style.height = displayRegion.h + 'px';
  const lbl = document.createElement('span');
  lbl.style.cssText = `position:absolute;top:-20px;left:0;font-size:11px;color:white;background:${color};padding:1px 6px;border-radius:3px;`;
  lbl.textContent = label;
  div.appendChild(lbl);
  imageContainer.appendChild(div);
}

function removeTempBox(key) {
  const el = document.getElementById('tmpbox-' + key);
  if (el) el.remove();
}




// ============ 渲染框 ============
function renderAnnotationBoxes(ann) {
  // 清除该ann旧框
  document.querySelectorAll(`[data-ann-id="${ann.id}"]`).forEach(el => el.remove());

  const cfg = typeConfig[ann.type];
  const idx = getAnnIndex(ann.id);

  function makeBox(region, color, labelText, isAnswer) {
    const div = document.createElement('div');
    div.className = 'annotation-box ' + cfg.colorClass;
    div.dataset.annId = ann.id;
    div.style.left = region.x + 'px';
    div.style.top = region.y + 'px';
    div.style.width = region.w + 'px';
    div.style.height = region.h + 'px';
    div.style.borderColor = color;
    div.style.borderStyle = isAnswer ? 'dashed' : 'solid';
    div.style.background = color + '18';

    const label = document.createElement('div');
    label.className = 'box-label';
    label.style.background = color;
    label.textContent = labelText;
    div.appendChild(label);

    div.onclick = function(e) { selectAnnotation(ann.id); };
    imageContainer.appendChild(div);
    return div;
  }

  // 题干框（实线）
  if (ann.stem) {
    makeBox(ann.stem.display, cfg.borderColor, `#${idx} ${cfg.label} 题干`, false);
  }
  // 作答框（虚线）
  if (ann.answer) {
    makeBox(ann.answer.display, cfg.borderColor, `#${idx} ${cfg.label} 作答`, true);
  }
  // 子题框
  if (ann.subQuestions) {
    ann.subQuestions.forEach((sq, si) => {
      const subColor = '#009688';
      if (sq.stem)   makeBox(sq.stem.display,   subColor, `#${idx}-${si+1} 子题干`, false);
      if (sq.answer) makeBox(sq.answer.display, subColor, `#${idx}-${si+1} 子作答`, true);
    });
  }
}



function getAnnIndex(id) {
  return annotations.findIndex(a => a.id === id) + 1;
}

function refreshAllBoxLabels() {
  annotations.forEach(ann => renderAnnotationBoxes(ann));
}

// ============ 渲染列表 ============
function renderAnnotationsList() {
  const list = document.getElementById('annotations-list');
  document.getElementById('info-count').textContent = annotations.length;

  if (annotations.length === 0) {
    list.innerHTML = '<div class="empty-hint">暂无标注，请上传图片后开始框选</div>';
    document.getElementById('progress-fill').style.width = '0%';
    return;
  }

  const done = annotations.filter(a => a.status !== null).length;
  const pct = Math.round(done / annotations.length * 100);
  document.getElementById('progress-fill').style.width = pct + '%';

  list.innerHTML = '';
  annotations.forEach((ann, idx) => {
    const cfg = typeConfig[ann.type];
    const div = document.createElement('div');
    div.className = 'annotation-item ' + (ann.id === selectedId ? 'selected' : '');
    div.style.borderLeftColor = cfg.borderColor;
    div.id = 'item-' + ann.id;

    // 头部
    const header = document.createElement('div');
    header.className = 'ann-header';
    header.innerHTML = `
      <span class="ann-number">#${idx+1}</span>
      <span class="ann-type-badge ${cfg.colorClass}">${cfg.label}</span>
      ${ann.status ? '<span style="font-size:12px;color:#666;">' + statusConfig[ann.status].label + '</span>' : '<span style="font-size:12px;color:#aaa;">未标注</span>'}
      <button class="ann-delete-btn" onclick="deleteAnnotation(${ann.id})">×</button>
    `;
    div.appendChild(header);

    // 答案状态
    const statusArea = document.createElement('div');
    statusArea.innerHTML = '<div class="status-label">答案状态：</div>';
    const statusBtns = document.createElement('div');
    statusBtns.className = 'status-btns';
    cfg.statuses.forEach(s => {
      const sc = statusConfig[s];
      const btn = document.createElement('button');
      btn.className = 'status-btn ' + sc.cls + (ann.status === s ? ' active' : '');
      btn.textContent = sc.label;
      btn.onclick = function(e) { e.stopPropagation(); setStatus(ann.id, s); };
      statusBtns.appendChild(btn);
    });
    statusArea.appendChild(statusBtns);
    div.appendChild(statusArea);

        // 问答题子题
    if (ann.type === 'qa') {
      const subArea = document.createElement('div');
      subArea.className = 'sub-question-area';

      const subHeader = document.createElement('div');
      subHeader.style.cssText = 'display:flex;align-items:center;margin-top:8px;';
      const subLabel = document.createElement('div');
      subLabel.className = 'status-label';
      subLabel.style.margin = '0';
      subLabel.textContent = `子题（${ann.subQuestions.length}）：`;
      const addSubBtn = document.createElement('button');
      addSubBtn.className = 'add-sub-btn';
      addSubBtn.style.marginLeft = 'auto';
      addSubBtn.textContent = '+ 添加子题';
      addSubBtn.onclick = function(e) {
        e.stopPropagation();
        startSubQuestionDraw(ann.id, ann.subQuestions.length + 1);
      };
      subHeader.appendChild(subLabel);
      subHeader.appendChild(addSubBtn);
      subArea.appendChild(subHeader);

      ann.subQuestions.forEach((sq, si) => {
        const sqItem = document.createElement('div');
        sqItem.className = 'sub-question-item';
        sqItem.style.flexDirection = 'column';
        sqItem.style.alignItems = 'stretch';

        // 子题头
        const sqHead = document.createElement('div');
        sqHead.style.cssText = 'display:flex;align-items:center;gap:8px;';
        sqHead.innerHTML = `<span class="sub-q-label" style="font-weight:bold;">子题 ${si+1}</span>`;

        // 框选情况提示
        const hasStem = !!sq.stem, hasAns = !!sq.answer;
        const regionInfo = document.createElement('span');
        regionInfo.style.cssText = 'font-size:11px;color:#888;';
        regionInfo.textContent = (hasStem ? '✓题干 ' : '✗题干 ') + (hasAns ? '✓作答' : '✗作答');
        sqHead.appendChild(regionInfo);

        const reDrawBtn = document.createElement('button');
        reDrawBtn.style.cssText = 'margin-left:auto;font-size:11px;color:#1a73e8;background:none;border:1px solid #1a73e8;border-radius:4px;padding:2px 8px;cursor:pointer;';
        reDrawBtn.textContent = '重新框选';
        reDrawBtn.onclick = function(e) {
          e.stopPropagation();
          ann.subQuestions.splice(si, 1); // 先删除，重新框选
          renderAnnotationBoxes(ann);
          renderAnnotationsList();
          startSubQuestionDraw(ann.id, si + 1);
        };
        sqHead.appendChild(reDrawBtn);

        const delSub = document.createElement('button');
        delSub.style.cssText = 'background:none;border:none;color:#ea4335;cursor:pointer;font-size:16px;margin-left:4px;';
        delSub.textContent = '×';
        delSub.onclick = function(e) {
          e.stopPropagation();
          ann.subQuestions.splice(si, 1);
          renderAnnotationBoxes(ann);
          renderAnnotationsList();
        };
        sqHead.appendChild(delSub);
        sqItem.appendChild(sqHead);

        // 状态按钮
        const statusBtns = document.createElement('div');
        statusBtns.className = 'status-btns';
        statusBtns.style.marginTop = '6px';
        ['correct','wrong','partial','blank'].forEach(s => {
          const sc = statusConfig[s];
          const btn = document.createElement('button');
          btn.className = 'status-btn ' + sc.cls + (sq.status === s ? ' active' : '');
          btn.textContent = sc.label;
          btn.onclick = function(e) {
            e.stopPropagation();
            ann.subQuestions[si].status = s;
            renderAnnotationsList();
          };
          statusBtns.appendChild(btn);
        });
        sqItem.appendChild(statusBtns);

        // 子题备注
        const subNote = document.createElement('textarea');
        subNote.className = 'note-input';
        subNote.rows = 1;
        subNote.placeholder = '子题备注...';
        subNote.value = sq.note || '';
        subNote.onclick = e => e.stopPropagation();
        subNote.oninput = function() { ann.subQuestions[si].note = this.value; };
        sqItem.appendChild(subNote);

        subArea.appendChild(sqItem);
      });

      div.appendChild(subArea);
    }




    // 备注
    const noteInput = document.createElement('textarea');
    noteInput.className = 'note-input';
    noteInput.rows = 2;
    noteInput.placeholder = '备注（可选）...';
    noteInput.value = ann.note || '';
    noteInput.onclick = e => e.stopPropagation();
    noteInput.oninput = function() { ann.note = this.value; };
    div.appendChild(noteInput);

    div.onclick = function() { selectAnnotation(ann.id); };
    list.appendChild(div);
  });
}

// ============ 子题框选 ============
function startSubQuestionDraw(annId, subIndex) {
  pendingSubAnnotationId = annId;
  pendingSubQuestion = { _index: subIndex, status: null, note: '', stem: null, answer: null };
  setDrawingPhase('sub_stem');
  document.getElementById('image-panel').scrollIntoView({ behavior: 'smooth', block: 'start' });
}




// ============ 选中标注 ============
function selectAnnotation(id) {
  selectedId = id;
  document.querySelectorAll('.annotation-item').forEach(el => el.classList.remove('selected'));
  const item = document.getElementById('item-' + id);
  if (item) { item.classList.add('selected'); item.scrollIntoView({ block: 'nearest' }); }
  document.querySelectorAll('.annotation-box').forEach(el => {
    const isSelected = el.dataset.annId == id;
    el.style.opacity = isSelected ? '1' : '0.45';
    el.style.zIndex = isSelected ? '10' : '1';
  });
}


// ============ 设置状态 ============
function setStatus(id, status) {
  const ann = annotations.find(a => a.id === id);
  if (ann) { ann.status = status; renderAnnotationsList(); selectAnnotation(id); }
}

// ============ 删除 ============
function deleteAnnotation(id) {
  annotations = annotations.filter(a => a.id !== id);
  document.querySelectorAll(`[data-ann-id="${id}"]`).forEach(el => el.remove());
  if (selectedId === id) selectedId = null;
  refreshAllBoxLabels();
  renderAnnotationsList();
}


// ============ 清空 ============
function clearAll() {
  if (!confirm('确认清空所有标注？')) return;
  annotations = [];
  selectedId = null;
  drawingPhase = null;
  pendingAnnotation = null;
  document.getElementById('phase-hint').style.display = 'none';
  // 重新进入绘制（仅当有图片时）
  if (document.getElementById('main-image').src && document.getElementById('main-image').src !== window.location.href) {
    setDrawingPhase('stem');
  }

  document.querySelectorAll('.annotation-box').forEach(el => el.remove());
  renderAnnotationsList();
}

// ============ 选择题型 ============
function selectType(btn, type) {
  currentType = type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ============ 导出JSON ============
function exportJSON() {
  if (annotations.length === 0) { alert('暂无标注数据！'); return; }
  const basename = imageFilename.replace(/\.[^.]+$/, '');
  const data = {
    image_filename: imageFilename,
    image_size: { width: imageNaturalW, height: imageNaturalH },
    annotated_at: new Date().toISOString(),
    annotations: annotations.map((ann, idx) => {
      const obj = {
        id: idx + 1,
        type: ann.type,
        type_label: typeConfig[ann.type].label,
        stem_bbox: ann.stem ? ann.stem.bbox : null,
        answer_bbox: ann.answer ? ann.answer.bbox : null,
        status: ann.status,
        note: ann.note || '',
      };
      if (ann.type === 'qa' && ann.subQuestions && ann.subQuestions.length > 0) {
        obj.sub_questions = ann.subQuestions.map((sq, si) => ({
          index: si + 1,
          stem_bbox: sq.stem ? sq.stem.bbox : null,
          answer_bbox: sq.answer ? sq.answer.bbox : null,
          status: sq.status,
          note: sq.note || '',
        }));
      }
      return obj;
    })

  };

  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = basename + '_annotation.json'; // ← 文件名与图片名对应
  a.click();
  URL.revokeObjectURL(url);
}

// 窗口resize时更新显示尺寸
window.addEventListener('resize', updateDisplaySize);
</script>
